<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregnancy Calculator | UNFPA Philippines</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hot-pink: #FF1493;
            --deep-pink: #C71585;
            --soft-pink: #FF69B4;
            --edd-orange: #FF8C00;
            --white: #FFFFFF;
            --lab-blue: #0072bc;
            --tip-green: #1b7a43;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(255, 20, 147, 0.4), rgba(255, 20, 147, 0.4)),
                        url('https://images.unsplash.com/photo-1531983412531-1f49a365ffed?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            max-width: 950px; width: 95%; padding: 30px;
            border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            border: 5px solid var(--hot-pink); margin: 30px 0;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { width: 170px; margin-bottom: 10px; }
        h1 { color: var(--deep-pink); font-size: 2.2rem; margin: 0; font-weight: 800; text-transform: uppercase; }

        .input-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }

        .card-input {
            background: #FFF9FB; padding: 25px; border-radius: 25px;
            border: 2px solid var(--soft-pink); text-align: center;
        }
        .card-input i { font-size: 2rem; color: var(--hot-pink); margin-bottom: 10px; }
        .card-input h2 { color: var(--deep-pink); font-size: 1.4rem; margin: 5px 0; }
        label { display: block; margin: 10px 0; font-weight: 600; color: #444; font-size: 0.9rem; }

        input[type="date"] {
            width: 100%; padding: 12px; border: 2px solid var(--hot-pink);
            border-radius: 12px; font-size: 1rem; text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, var(--hot-pink), var(--deep-pink));
            color: white; border: none; padding: 15px;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 15px; width: 100%; transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(199, 21, 133, 0.4); }

        /* Milestone Highlight (EDD) - Orange Background, White Text */
        .edd-highlight {
            background-color: var(--edd-orange); color: var(--white);
            padding: 30px; border-radius: 25px; text-align: center;
            margin-bottom: 30px; display: none;
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.4);
            border: 2px solid #e67e00;
        }
        .edd-highlight i { font-size: 2.5rem; color: var(--white); margin-bottom: 10px; }
        .edd-label { text-transform: uppercase; font-size: 1rem; font-weight: 700; letter-spacing: 1px; }
        .edd-date { font-size: 2.5rem; font-weight: 800; margin-top: 10px; }

        .dashboard {
            display: none; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px;
        }
        .stat-card {
            background: white; border: 2px solid var(--hot-pink);
            padding: 20px; border-radius: 20px; text-align: center;
        }
        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--deep-pink); }
        .stat-label { font-size: 0.8rem; font-weight: 700; color: #777; text-transform: uppercase; }

        .results { display: none; }
        .section-title { 
            color: var(--deep-pink); font-size: 1.6rem; font-weight: 800;
            border-bottom: 4px solid var(--soft-pink); padding-bottom: 10px; margin-top: 40px;
            display: flex; align-items: center; gap: 12px;
        }

        .visit-card {
            background: white; margin: 20px 0; padding: 25px;
            border-radius: 20px; border-left: 12px solid var(--hot-pink);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; gap: 20px;
        }
        input[type="checkbox"] { width: 28px; height: 28px; accent-color: var(--hot-pink); cursor: pointer; flex-shrink: 0; }

        .v-content { flex-grow: 1; }
        .v-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .v-name { font-weight: 800; color: var(--deep-pink); font-size: 1.1rem; }
        .v-date { font-weight: 800; color: var(--hot-pink); }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .info-box h4 { margin: 0 0 8px 0; font-size: 0.8rem; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .lab-title { color: var(--lab-blue); }
        .tip-title { color: var(--tip-green); }
        .info-box p { margin: 0; font-size: 0.95rem; line-height: 1.5; color: #333; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .v-header { flex-direction: column; align-items: flex-start; gap: 5px; }
            .edd-date { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://www.unfpa.org/sites/default/files/unfpa_logo.png" alt="UNFPA Logo" class="logo">
        <h1><i class="fa-solid fa-heart-pulse"></i> Pregnancy Calculator</h1>
    </div>

    <div class="input-grid">
        <div class="card-input">
            <i class="fa-solid fa-person-pregnant"></i>
            <h2>Pag Buntis</h2>
            <label>Unang Araw ng Huling Regla (LMP):</label>
            <input type="date" id="lmp">
            <button class="btn" onclick="calcANC()"><i class="fa-solid fa-calculator"></i> Kalkulahin ang Schedule</button>
        </div>
        <div class="card-input">
            <i class="fa-solid fa-baby"></i>
            <h2>Nanganak Na</h2>
            <label>Petsa ng Panganganak (DOD):</label>
            <input type="date" id="dod">
            <button class="btn" onclick="calcPNC()"><i class="fa-solid fa-stethoscope"></i> Tignan ang PNC Schedule</button>
        </div>
    </div>

    <div id="eddCard" class="edd-highlight">
        <i class="fa-solid fa-calendar-star"></i>
        <div class="edd-label">Inaasahang Petsa ng Panganganak (EDD)</div>
        <div id="eddDisplay" class="edd-date"></div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="stat-card" id="ancBox">
            <div class="stat-label">ANC Compliance</div>
            <div class="stat-val" id="ancRate">0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">PNC Compliance</div>
            <div class="stat-val" id="pncRate">0%</div>
        </div>
    </div>

    <div id="results" class="results">
        <div id="ancArea">
            <div class="section-title"><i class="fa-solid fa-clipboard-list"></i> Antenatal Care (ANC) Schedule</div>
            <div id="ancList"></div>
        </div>
        <div id="pncArea">
            <div class="section-title"><i class="fa-solid fa-house-medical-circle-check"></i> Postnatal Care (PNC) Schedule</div>
            <div id="pncList"></div>
        </div>
    </div>
</div>

<script>
    const clinicalFilipino = {
        12: { 
            labs: "Full Blood Count (CBC), Blood Type & Rh Factor, screening para sa HIV, Hepatitis B (HBsAg), at Syphilis (VDRL). Initial Urinalysis.",
            tips: "Simulan ang pag-inom ng Folic Acid (400mcg) araw-araw para sa utak at spine ni baby. Iwasan ang hilaw na karne at isda."
        },
        20: { 
            labs: "Congenital Anomaly Scan (Ultrasound) para masuri ang mga organ ni baby. Pag-check ng Blood Pressure at fundal height.",
            tips: "Dagdagan ang Calcium at Iron intake. Karaniwang nararamdaman na ang unang sipa ni baby sa mga linggong ito."
        },
        26: { 
            labs: "Oral Glucose Tolerance Test (OGTT) para sa Gestational Diabetes. Ulitin ang Hemoglobin check para sa anemia.",
            tips: "Iwasan ang sobrang asukal at asin. Matulog sa kaliwang tagiliran (left side) para sa maayos na blood flow kay baby."
        },
        30: { 
            labs: "Urinalysis para sa protina (Pre-eclampsia check). Pag-monitor ng paglaki ni baby gamit ang fundal height.",
            tips: "Gawin ang 'Kick Counts': Dapat mayroong 10 sipa sa loob ng 2 oras. Itaas ang mga paa kung nakararanas ng pamamanas."
        },
        34: { 
            labs: "Bakuna para sa Tetanus (Tdap). Ulitin ang ultrasound kung kailangang tignan ang posisyon ng placenta.",
            tips: "Ihanda na ang 'Go Bag' at Birth Plan. Siguraduhing kumpleto ang PhilHealth at maternal health records."
        },
        36: { 
            labs: "Group B Strep (GBS) swab test. Pelvic assessment para malaman kung 'head down' na ang posisyon ni baby.",
            tips: "Maging aktibo sa paglalakad sa umaga. Pag-aralan ang tamang paghinga (breathing exercises) para sa labor."
        },
        38: { 
            labs: "Internal Exam (IE) para tignan ang dilation ng cervix. Pag-check ng fetal heartbeat gamit ang Doppler.",
            tips: "Magpahinga nang madalas. Bantayan ang mga senyales ng labor: regular na contractions, 'bloody show,' o pagputok ng panubigan."
        },
        40: { 
            labs: "Non-Stress Test (NST) at Biophysical Profile (BPP) ultrasound para masigurong maayos ang kalagayan ni baby.",
            tips: "Manatiling kalmado at positibo. Siguraduhing laging naka-charge ang cellphone at handa ang transportasyon."
        }
    };

    function calcANC() {
        const val = document.getElementById('lmp').value;
        if(!val) return alert("Pakilagay ang petsa ng LMP.");
        const lmp = new Date(val);
        const edd = new Date(lmp); edd.setDate(lmp.getDate() + 280);
        
        document.getElementById('eddDisplay').innerText = edd.toLocaleDateString('fil-PH', { month:'long', day:'numeric', year:'numeric' });
        document.getElementById('eddCard').style.display = 'block';
        document.getElementById('ancArea').style.display = 'block';
        document.getElementById('ancBox').style.display = 'block';
        
        renderANC(lmp); renderPNC(edd);
        finishSetup();
    }

    function calcPNC() {
        const val = document.getElementById('dod').value;
        if(!val) return alert("Pakilagay ang petsa ng panganganak.");
        const dod = new Date(val);
        
        document.getElementById('eddCard').style.display = 'none';
        document.getElementById('ancArea').style.display = 'none';
        document.getElementById('ancBox').style.display = 'none';
        
        renderPNC(dod);
        finishSetup();
    }

    function renderANC(lmp) {
        const list = document.getElementById('ancList'); list.innerHTML = '';
        [12, 20, 26, 30, 34, 36, 38, 40].forEach((wk, i) => {
            const date = new Date(lmp); date.setDate(lmp.getDate() + (wk * 7));
            const detail = clinicalFilipino[wk];
            list.innerHTML += `<div class="visit-card">
                <input type="checkbox" class="a-chk" onclick="updateStats()">
                <div class="v-content">
                    <div class="v-header">
                        <span class="v-name"><i class="fa-solid fa-user-doctor"></i> Bisita ${i+1} (Linggo ${wk})</span>
                        <span class="v-date">${date.toLocaleDateString('fil-PH', {month:'long', day:'numeric', year:'numeric'})}</span>
                    </div>
                    <div class="info-grid">
                        <div class="info-box">
                            <h4 class="lab-title"><i class="fa-solid fa-vial-virus"></i> Laboratoryo</h4>
                            <p>${detail.labs}</p>
                        </div>
                        <div class="info-box">
                            <h4 class="tip-title"><i class="fa-solid fa-lightbulb"></i> Wellness Tip</h4>
                            <p>${detail.tips}</p>
                        </div>
                    </div>
                </div>
            </div>`;
        });
    }

    function renderPNC(base) {
        const list = document.getElementById('pncList'); list.innerHTML = '';
        const pncTips = [
            "Pagsusuri sa pagdurugo (lochia) at pagliit ng matris. Pagsisimula ng exclusive breastfeeding sa loob ng unang oras.",
            "Newborn Screening at Hearing test para sa baby. Pag-obserba sa 'Postpartum Blues' o kalungkutan ni Mommy.",
            "Pagsusuri sa tahi (kung CS) at pangangalaga sa pusod ni baby. Masustansyang pagkain para sa mabilis na paggaling.",
            "Family Planning counseling at pagpili ng contraceptive. Kabuuang pagsusuri sa mental health at physical recovery."
        ];
        const titles = ["Visit 1 (24 Oras)", "Visit 2 (3 Araw)", "Visit 3 (1-2 Linggo)", "Visit 4 (6 na Linggo)"];
        [1, 3, 10, 42].forEach((day, i) => {
            const date = new Date(base); date.setDate(base.getDate() + day);
            list.innerHTML += `<div class="visit-card">
                <input type="checkbox" class="p-chk" onclick="updateStats()">
                <div class="v-content">
                    <div class="v-header">
                        <span class="v-name"><i class="fa-solid fa-house-user"></i> ${titles[i]}</span>
                        <span class="v-date">${date.toLocaleDateString('fil-PH', {month:'long', day:'numeric', year:'numeric'})}</span>
                    </div>
                    <div class="info-box">
                        <h4 class="tip-title"><i class="fa-solid fa-kit-medical"></i> Gabay sa Recovery</h4>
                        <p>${pncTips[i]}</p>
                    </div>
                </div>
            </div>`;
        });
    }

    function updateStats() {
        const a = document.querySelectorAll('.a-chk'), p = document.querySelectorAll('.p-chk');
        const aR = a.length ? Math.round((Array.from(a).filter(c=>c.checked).length/a.length)*100) : 0;
        const pR = p.length ? Math.round((Array.from(p).filter(c=>c.checked).length/p.length)*100) : 0;
        document.getElementById('ancRate').innerText = aR + "%";
        document.getElementById('pncRate').innerText = pR + "%";
    }

    function finishSetup() {
        document.getElementById('results').style.display = 'block';
        document.getElementById('dashboard').style.display = 'grid';
        window.scrollTo({ top: document.getElementById('dashboard').offsetTop - 20, behavior: 'smooth' });
    }
</script>

</body>
</html>
